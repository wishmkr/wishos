name: Build WishOS Linux 7 Kernel

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-kernel:
    name: Linux 7.1.3 x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bc \
            bison \
            flex \
            libelf-dev \
            libssl-dev \
            dwarves \
            xz-utils \
            wget

      - name: Download Linux 7.1.3
        run: |
          wget --https-only \
            https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.1.3.tar.xz

          wget --https-only \
            https://cdn.kernel.org/pub/linux/kernel/v7.x/linux-7.1.3.tar.sign

      - name: Extract kernel source
        run: |
          tar -xf linux-7.1.3.tar.xz

      - name: Configure WishOS kernel
        working-directory: linux-7.1.3
        run: |
          make x86_64_defconfig

          scripts/config --enable DEVTMPFS
          scripts/config --enable DEVTMPFS_MOUNT
          scripts/config --enable TMPFS
          scripts/config --enable PROC_FS
          scripts/config --enable SYSFS
          scripts/config --enable EXT4_FS
          scripts/config --enable BLK_DEV_INITRD

          scripts/config --enable VIRTIO
          scripts/config --enable VIRTIO_PCI
          scripts/config --enable VIRTIO_BLK
          scripts/config --enable VIRTIO_NET

          scripts/config --enable SERIAL_8250
          scripts/config --enable SERIAL_8250_CONSOLE

          make olddefconfig

      - name: Build WishOS kernel
        working-directory: linux-7.1.3
        run: |
          make -j"$(nproc)" bzImage modules

      - name: Install kernel modules
        working-directory: linux-7.1.3
        run: |
          mkdir -p ../output/modules

          make modules_install \
            INSTALL_MOD_PATH="../output/modules"

      - name: Prepare output
        run: |
          mkdir -p output/boot

          cp linux-7.1.3/arch/x86/boot/bzImage \
            output/boot/wishos-vmlinuz-7.1.3

          cp linux-7.1.3/.config \
            output/boot/wishos-kernel-7.1.3.config

          cp linux-7.1.3/System.map \
            output/boot/System.map-7.1.3

          cp linux-7.1.3/COPYING \
            output/KERNEL-LICENSE

          printf '%s\n' \
            'WishOS kernel' \
            'Linux version: 7.1.3' \
            'Architecture: x86_64' \
            'Configuration: x86_64_defconfig + WishOS boot options' \
            > output/BUILD-INFO.txt

      - name: Create checksums
        working-directory: output
        run: |
          find . -type f -print0 |
            sort -z |
            xargs -0 sha256sum > SHA256SUMS

      - name: Package build output
        run: |
          tar -C output \
            -cJf wishos-kernel-7.1.3-x86_64.tar.xz .

      - name: Upload WishOS kernel
        uses: actions/upload-artifact@v4
        with:
          name: wishos-kernel-7.1.3-x86_64
          path: wishos-kernel-7.1.3-x86_64.tar.xz
          retention-days: 30
          if-no-files-found: error
